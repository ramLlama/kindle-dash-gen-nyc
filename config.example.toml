# Example configuration for kindle-dash-gen.
# Copy to config.toml and edit. config.toml is gitignored (it may hold secrets).

# Optional: an absolute package directory of your own private plugins — render layouts
# (see docs/plugins.md) and/or data sources (see docs/sources.md). Each subpackage registers a
# layout or a source you can then reference by name (a dashboard's `layout = "..."`, or a
# `[sources.<name>]` table).
# plugins_path = "/home/you/kindle-dash-gen-nyc/kindle_dash_gen_nyc_plugins"

# Data sources are plugins, each configured by a [sources.<name>] table whose key is the source's
# registered name. The bundled sources are "nws" (weather) and "mta" (subway). Configure only the
# ones you want; zero sources is valid (every render then skips, keeping the last image). Each
# source validates its own table strictly (unknown keys are rejected). See docs/sources.md.

[sources.nws]              # National Weather Service forecast (keyless, US-only)
latitude = 40.7484
longitude = -73.9857
user_agent = "kindle-dash-gen (you@example.com)"   # NWS requires a User-Agent
hourly_hours = 4       # number of upcoming hourly forecasts to include
# Note: display units are NOT set here — they are a per-dashboard choice (weather_temp_units below).

# Alternative weather provider: "open-meteo" (keyless, global) also supplies air quality (US AQI +
# particulates). Configure the source(s) your enabled layouts need — the glanceable layout renders
# whichever weather type is present, preferring open-meteo when both are configured. To use it,
# comment out [sources.nws] above and uncomment this block (no user_agent required):
# [sources.open-meteo]
# latitude = 40.7484
# longitude = -73.9857
# hourly_hours = 4       # number of upcoming hourly forecasts to include

# The "mta" source: real-time subway arrivals. Stations are keyed by display name, under
# [sources.mta.stations."Name"]. A station has one or more platform entries
# ([[sources.mta.stations."Name".platforms]] blocks); the platforms' arrivals are merged into a
# single board. A platform has one GTFS base stop id (N/S suffix handled via direction), so lines on
# different platforms (e.g. the L vs the N/Q/R/W at Union Sq) are separate platform entries under one
# name. Boards carry every upcoming arrival; how many to show is up to the layout.
#
# Finding your stop_id and lines: run `python -m kindle_dash_gen mta list-stations` to dump
# every station as "stop_id <tab> routes <tab> name", then grep it, e.g.
#   uv run python -m kindle_dash_gen mta list-stations | grep -i "union sq"
# Use the base stop id (e.g. R20), not the N/S-suffixed variant.
#
# Optional `display_name` sets the label a layout shows; the key stays the canonical name that
# plugins match on (e.g. home_mta_map), so renaming the display never breaks that match.
[sources.mta.stations."Union Sq"]
  # display_name = "Union Square"

  [[sources.mta.stations."Union Sq".platforms]]
  lines = ["N", "Q", "R", "W"]
  stop_id = "R20"
  direction = "both"       # "north", "south", or "both"

  [[sources.mta.stations."Union Sq".platforms]]
  lines = ["4", "5", "6"]
  stop_id = "635"
  direction = "both"

  [[sources.mta.stations."Union Sq".platforms]]
  lines = ["L"]
  stop_id = "L03"
  direction = "both"

# A second nearby station renders as its own column: the 6th Ave "14 St" (F, M),
# a few blocks west of Union Sq.
[sources.mta.stations."14 St-6 Av"]

  [[sources.mta.stations."14 St-6 Av".platforms]]
  lines = ["F", "M"]
  stop_id = "D19"
  direction = "both"

# One or more output dashboards, each keyed by a name ([dashboards.<name>]). A single run gathers
# every source's data once and renders every dashboard from it, writing each to its own path.
# The name appears in the run's log lines. At least one dashboard is required.
#
# A dashboard owns the *output*: which layout draws it, where to write it, and the Kindle output
# spec. The *layout* owns how it draws — its own config lives in [dashboards.<name>.layout_config]
# (validated by the layout; see docs/plugins.md).
[dashboards.main]
layout = "glanceable"              # bundled layout name (see docs/plugins.md)
output_path = "./out/dashboard.png"
width = 1072               # Kindle Voyage, portrait (native orientation)
height = 1448
gray_levels = 16           # Voyage 4-bit grayscale
# How the rendered image is fitted to width x height (the layout draws at the exact size, so only
# the gray-level quantization normally applies):
#   "resize" -- stretch to fill, ignoring aspect (minor distortion)
#   "crop"   -- scale to cover, center-crop the excess (no distortion, trims a sliver)
#   "pad"    -- scale to fit, add white e-ink bars (nothing cropped or distorted)
post_process_method = "resize"
# rotate = true             # rotate the final image 90° before writing (for a physically rotated device)

# The glanceable layout's own config (its schema — unknown keys are rejected).
[dashboards.main.layout_config]
# Header text at the top-left of the dashboard (a city or place name). Required — no default.
title = "NYC"
# IANA timezone every displayed time is shown in. Required: sources report aware UTC, so the
# layout needs a zone to render local clock times (this is what lets one run serve dashboards
# in different regions).
timezone = "America/New_York"
# Display units for weather temperatures: "us" (°F), "si" (°C), or "both".
weather_temp_units = "both"
# font: system font family (fontconfig). Omit to let the layout choose its own default (glanceable
# uses "Adwaita Sans"). A set value overrides the layout's default for every glyph.
font = "Adwaita Sans"

# A second dashboard rendered from the same data to a different path (e.g. a second device, a
# landscape variant, or another city). Delete this block if you only need one output. One fetch
# feeds every dashboard, and each converts times to its own timezone — so a second city here needs
# no second run.
# [dashboards.landscape]
# layout = "glanceable"
# output_path = "./out/dashboard-landscape.png"
# width = 1448
# height = 1072
#
#   [dashboards.landscape.layout_config]   # required: title and timezone have no defaults
#   title = "NYC"
#   timezone = "America/New_York"

[schedule]
interval_minutes = 5
