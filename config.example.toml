# Example configuration for kindle-dash-gen.
# Copy to config.toml and edit. config.toml is gitignored (it may hold secrets).

# Optional: an absolute package directory of your own private render layouts (see docs/plugins.md).
# Each subpackage registers a layout you can then select with `layout = "..."` on a dashboard below.
# plugins_path = "/home/you/kindle-dash-gen-nyc/kindle_dash_gen_nyc_plugins"

[location]                 # used by the NWS weather API
latitude = 40.7484
longitude = -73.9857

[weather]
user_agent = "kindle-dash-gen (you@example.com)"   # NWS requires a User-Agent
units = "both"           # display units: "us" (°F), "si" (°C), or "both"
rollover_hour = 20     # after this local hour, high/low show the next day
hourly_hours = 4       # number of upcoming hourly forecasts to include

# Stations are keyed by display name. A station has one or more platform entries
# ([[stations."Name".platforms]] blocks); the platforms' arrivals are merged into a single board.
# A platform has one GTFS base stop id (N/S suffix handled via direction), so lines on different
# platforms (e.g. the L vs the N/Q/R/W at Union Sq) are separate platform entries under one name.
# Boards carry every upcoming arrival; how many to show is up to the layout (see docs/plugins.md).
#
# Finding your stop_id and lines: run `python -m kindle_dash_gen mta list-stations` to dump
# every station as "stop_id <tab> routes <tab> name", then grep it, e.g.
#   uv run python -m kindle_dash_gen mta list-stations | grep -i "union sq"
# Use the base stop id (e.g. R20), not the N/S-suffixed variant.
#
# Optional `display_name` sets the label a layout shows; the key stays the canonical name that
# plugins match on (e.g. home_mta_map), so renaming the display never breaks that match.
[stations."Union Sq"]
  # display_name = "Union Square"

  [[stations."Union Sq".platforms]]
  lines = ["N", "Q", "R", "W"]
  stop_id = "R20"
  direction = "both"       # "north", "south", or "both"

  [[stations."Union Sq".platforms]]
  lines = ["4", "5", "6"]
  stop_id = "635"
  direction = "both"

  [[stations."Union Sq".platforms]]
  lines = ["L"]
  stop_id = "L03"
  direction = "both"

# A second nearby station renders as its own column: the 6th Ave "14 St" (F, M),
# a few blocks west of Union Sq.
[stations."14 St-6 Av"]

  [[stations."14 St-6 Av".platforms]]
  lines = ["F", "M"]
  stop_id = "D19"
  direction = "both"

# [openrouter] is only needed when some dashboard uses backend = "llm" (below). The default pillow
# backend draws the dashboard locally and needs no API key, so you can delete this whole section.
[openrouter]
model = "google/gemini-3.1-flash-lite-image"
# Provide the API key either inline or via a command that prints it:
api_key = { value_from_cmd = "pass show openrouter/key" }
# api_key = { value = "sk-or-..." }
prompt_template = "dense"  # bundled template name, or a filesystem path to your own "*.j2" file
# prompt_template = "./my_prompt.j2"

# Custom templates (prompt_template pointing at your own file) are Jinja2 and get this context:
#   weather -- WeatherReport | None      boards  -- list[StationBoard]
#   units   -- "us" | "si" | "both"      width, height -- int (from [dashboards.<name>] below)
#   aspect  -- resolved aspect ratio, e.g. "4:3"     now -- datetime (= generation time)
# Plus display-formatting helpers as globals:
#   format_reading(temp, units)   format_apparent(temp, units)   format_temp(celsius, units)
#   format_wind(kmh, direction, units)      format_eta(arrival, now)
#   weather_icon(report) -> "sunny" | "cloudy" | "rain" | "snow"
# See kindle_dash_gen/render/prompt.py and assets/dashboard_prompts/dense.j2 for details.

# One or more output dashboards, each keyed by a name ([dashboards.<name>]). A single run gathers
# the weather + subway data once and renders every dashboard from it, writing each to its own path.
# The name appears in the run's log lines. At least one dashboard is required.
[dashboards.main]
path = "./out/dashboard.png"
# Rendering backend:
#   "pillow" -- draw the dashboard locally (free, offline, exact); no [openrouter] needed
#   "llm"    -- an OpenRouter image model renders from a prompt (requires [openrouter])
backend = "pillow"
layout = "glanceable"      # pillow backend: bundled layout name (see render/layout.py)
# font: pillow backend system font family (fontconfig). Omit to let the layout choose its own
# default (glanceable uses "Adwaita Sans"; home_mta_map uses Futura + Helvetica Neue). A set value
# overrides the layout's default for every glyph.
font = "Adwaita Sans"
width = 1072               # Kindle Voyage, portrait (native orientation)
height = 1448
gray_levels = 16           # Voyage 4-bit grayscale
# How the rendered image is fitted to width x height (mainly for the llm backend; the pillow
# backend already draws at the exact size, so only the gray-level quantization applies):
#   "resize" -- stretch to fill, ignoring aspect (minor distortion)
#   "crop"   -- scale to cover, center-crop the excess (no distortion, trims a sliver)
#   "pad"    -- scale to fit, add white e-ink bars (nothing cropped or distorted)
post_process_method = "resize"
# rotate = true             # rotate the final image 90° before writing (for a physically rotated device)
# aspect_ratio = "3:4"      # llm backend: override the model's nearest-match aspect ratio
# resolution = "1K"         # llm backend: override the model's default resolution

# A second dashboard rendered from the same data to a different path (e.g. a second device, or a
# landscape variant). Delete this block if you only need one output.
# [dashboards.landscape]
# path = "./out/dashboard-landscape.png"
# width = 1448
# height = 1072

[schedule]
interval_minutes = 5
